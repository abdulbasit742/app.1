name: PES application CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python scripts/security_check.py
      - run: python -m compileall -q src tests scripts
      - name: Application factory smoke test
        env:
          SECRET_KEY: ci-only-secret-key-that-is-long-enough
          SESSION_COOKIE_SECURE: 'false'
        run: python -c "from src.main import create_app; app=create_app({'TESTING': True, 'SQLALCHEMY_DATABASE_URI': 'sqlite:///:memory:'}); assert app.test_client().get('/api/health').status_code == 200"
